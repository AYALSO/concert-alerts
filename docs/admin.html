<!doctype html>
<html dir="rtl" lang="he"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>פאנל ניהול אמנים</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  color-scheme:dark;
  --bg:#0b1020; --panel:#131a2e; --panel2:#182136; --line:#232e4a;
  --text:#eef1f7; --dim:#93a0b8; --accent:#3b82f6; --accent2:#2563eb;
  --warn:#f59e0b; --danger:#ef4444; --ok:#22c55e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;
  background:var(--bg);color:var(--text)}
#warn{background:#3a2030;color:#ffb4c4;padding:10px 14px;font-size:13px;display:none}

header{position:sticky;top:0;z-index:5;background:rgba(11,16,32,.94);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  padding:12px 14px 0;border-bottom:1px solid var(--line)}
h1{font-size:17px;margin:0 0 10px;font-weight:800}
#q{width:100%;padding:10px 13px;font-size:16px;border-radius:12px;border:1px solid var(--line);
  background:var(--panel);color:var(--text);outline:none}
#q:focus{border-color:var(--accent)}

#tabs{display:flex;gap:6px;margin:10px 0 0;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:8px 12px;font-size:13.5px;color:var(--dim);background:none;border:0;
  border-bottom:2.5px solid transparent;white-space:nowrap}
.tab b{color:var(--text);font-weight:700}
.tab small{opacity:.8;font-weight:600;margin-inline-start:3px}
.tab.on{border-color:var(--accent)}
.tab.on b{color:var(--accent)}

#chips{display:flex;gap:6px;padding:8px 0 10px;overflow-x:auto;scrollbar-width:none}
#chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:5px 11px;border-radius:999px;border:1px solid var(--line);
  background:var(--panel);color:#cdd5e4;font-size:12.5px;white-space:nowrap}
.chip.on{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:700}

ul{list-style:none;margin:0;padding:6px 10px 120px}
li{display:flex;align-items:center;gap:10px;padding:10px 10px;margin:4px 0;
  border-radius:13px;background:var(--panel);border:1px solid var(--line);cursor:pointer}
li:active{background:var(--panel2)}
li.hidden-row{opacity:.55}
li.merged-row{border-color:#4a3568;background:#1c1630}
.cbadge{flex:none;width:34px;height:34px;border-radius:10px;background:var(--panel2);
  display:flex;align-items:center;justify-content:center;font-size:17px}
.rinfo{flex:1;min-width:0}
.rinfo b{display:block;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rinfo span{display:block;font-size:11.5px;color:var(--dim);margin-top:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flags{flex:none;display:flex;gap:5px;align-items:center;font-size:13px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--warn)}
.chev{flex:none;color:var(--dim);font-size:16px}
.empty{color:var(--dim);text-align:center;padding:36px 16px}

#fab{position:fixed;left:16px;right:16px;bottom:16px;z-index:6;display:none;
  padding:14px;font-size:16px;font-weight:700;border:0;border-radius:14px;
  background:var(--accent2);color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.5)}

#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:8;display:none}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:9;display:none;
  background:var(--panel);border-radius:18px 18px 0 0;border-top:1px solid var(--line);
  padding:14px 16px calc(18px + env(safe-area-inset-bottom));max-height:82vh;overflow-y:auto}
.grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
#sTitle{font-size:16px;font-weight:800;margin:0 0 2px}
#sSrc{font-size:12px;color:var(--dim);margin:0 0 14px}
.fld{font-size:12.5px;color:var(--dim);margin:12px 0 6px}
#sName{width:100%;padding:11px 13px;font-size:16px;border-radius:12px;border:1px solid var(--line);
  background:var(--bg);color:var(--text);outline:none}
#sName:focus{border-color:var(--accent)}
#sCats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.scat{padding:9px 4px;font-size:12.5px;border-radius:11px;border:1px solid var(--line);
  background:var(--bg);color:#cdd5e4;text-align:center}
.scat.on{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:700}
.switch{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:11px 13px;border-radius:12px;border:1px solid var(--line);background:var(--bg);margin-top:6px}
.switch span{font-size:14.5px}
.tgl{position:relative;width:46px;height:26px;flex:none}
.tgl input{opacity:0;width:0;height:0}
.knob{position:absolute;inset:0;border-radius:999px;background:#39415c;transition:.15s}
.knob:before{content:"";position:absolute;top:3px;inset-inline-start:3px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:.15s}
.tgl input:checked + .knob{background:var(--ok)}
.tgl input:checked + .knob:before{transform:translateX(-20px)}
html[dir=rtl] .tgl input:checked + .knob:before{transform:translateX(-20px)}
.sbtn{width:100%;margin-top:10px;padding:12px;font-size:14.5px;font-weight:600;
  border-radius:12px;border:1px solid var(--line);background:var(--bg);color:var(--text)}
.sbtn.merge{border-color:#7a4ad0;background:#2a2050;color:#cdb4ff}
.sbtn.revert{border-color:#5a2a3a;background:#3a2030;color:#ffb4c4}
.sbtn.done{border:0;background:var(--accent2);color:#fff;font-weight:700;margin-top:14px}
#mergedNote{display:none;margin-top:10px;padding:11px 13px;border-radius:12px;
  border:1px solid #7a4ad0;background:#241a3e;color:#d9c5ff;font-size:13.5px}
#showList,#mList{max-height:190px;overflow-y:auto;border:1px solid var(--line);border-radius:12px;
  background:var(--bg)}
#mList{margin-top:6px}
.mrow .sdate{min-width:24px}
#mSearch{width:100%;padding:10px 13px;font-size:15px;border-radius:12px;border:1px solid var(--line);
  background:var(--bg);color:var(--text);outline:none}
#mSearch:focus{border-color:var(--accent)}
.showrow{display:flex;align-items:center;gap:8px;padding:9px 11px;border-bottom:1px solid var(--line);
  color:var(--text);text-decoration:none;font-size:13.5px}
.showrow:last-child{border-bottom:0}
.showrow:active{background:var(--panel2)}
.showrow.soldout{opacity:.55}
.sdate{flex:none;font-weight:700;font-variant-numeric:tabular-nums;color:#bcd0f7;min-width:60px}
.svenue{flex:1;min-width:0;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sold{flex:none;font-size:11px;color:#ffb4c4;border:1px solid #5a2a3a;background:#3a2030;
  border-radius:999px;padding:2px 7px}
.schev{flex:none;color:var(--dim)}
</style></head><body>
<div id="warn">⚠️ פתח דרך הכפתור בבוט (פקודת /id) כדי שתהיה הרשאת שמירה.</div>
<header>
  <h1>🛠 ניהול אמנים</h1>
  <input id="q" placeholder="🔎 חיפוש אמן…" autocomplete="off">
  <nav id="tabs"></nav>
  <div id="chips"></div>
</header>
<ul id="list"></ul>
<button id="fab"></button>

<div id="backdrop"></div>
<div id="sheet">
  <div class="grab"></div>
  <h2 id="sTitle"></h2>
  <p id="sSrc"></p>
  <div id="sShows"></div>
  <div id="mergedNote"></div>
  <div id="editArea">
    <div class="fld">שם תצוגה</div>
    <input id="sName" autocomplete="off">
    <div class="fld">קטגוריה</div>
    <div id="sCats"></div>
    <div class="fld">נראוּת</div>
    <label class="switch"><span>מוצג ברשימת האמנים</span>
      <span class="tgl"><input type="checkbox" id="sVis"><span class="knob"></span></span>
    </label>
    <button class="sbtn merge" id="sMerge" style="display:none"></button>
    <button class="sbtn merge" id="sMergeAny">🔗 מזג לתוך אמן אחר…</button>
    <div id="mPick" style="display:none">
      <div class="fld">בחר לאן למזג — העוקבים וההופעות עוברים לאמן שתבחר</div>
      <input id="mSearch" placeholder="🔎 חיפוש אמן יעד…" autocomplete="off">
      <div id="mList"></div>
    </div>
  </div>
  <button class="sbtn revert" id="sRevert" style="display:none">↩️ בטל את השינויים ברשומה זו</button>
  <button class="sbtn done" id="sDone">סגור</button>
</div>

<script>
const WORKER = "https://concert-alerts-bot.tunaconcerts.workers.dev";
// The artist's current shows, straight from the public repo (raw GitHub is CORS-open).
const RAW_SHOWS = "https://raw.githubusercontent.com/AYALSO/concert-alerts/main/data/shows.json";
const STANDUP = new Set(["comy","comedybar"]);
const CATS = [["music","🎵 מוזיקה"],["standup","😂 סטנדאפ"],["theater","🎭 הצגות"],["lecture","🎓 הרצאות"]];
const CATE = {music:"🎵",standup:"😂",theater:"🎭",lecture:"🎓"};
const SRCL = {barby:"בארבי",eventim:"איוונטים",grayclub:"גריי",kupat:"קופת ת״א",
              comy:"קומי",comedybar:"קומדי בר",ticketmaster:"טיקטמאסטר"};
const TABS = [["visible","גלויים"],["hidden","מוסתרים"],["merged","מיזוגים"],["changed","שינויים"]];
const tg = window.Telegram && window.Telegram.WebApp;
const inApp = !!(tg && tg.initData);
if (inApp){ tg.ready(); tg.expand(); }

const $=id=>document.getElementById(id);
const list=$('list'), q=$('q'), tabsEl=$('tabs'), chipsEl=$('chips'), fab=$('fab');
if(!inApp) $('warn').style.display='block';

let ART={}, KEYS=[], state={}, OV0={}, tab='visible', cat='all', open=null, busy=false;

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function nrm(s){return (s||'').trim().toLowerCase();}
function base(info){
  const standup=(info.sources||[]).some(s=>STANDUP.has(s));
  return { name: info.display,
           cat: info.category || (standup?"standup":"music"),
           art: ('is_artist' in info)? !!info.is_artist : true };
}
function modified(k){
  const b=base(ART[k]), s=state[k];
  return s.name!==b.name || s.cat!==b.cat || s.art!==b.art || !!s.mergeInto;
}
// Another NON-merged artist that currently shows the same name (a merge target).
function dupKey(k){
  const n=nrm(state[k].name);
  for(const o of KEYS){ if(o!==k && !state[o].mergeInto && nrm(state[o].name)===n) return o; }
  return null;
}
function inTab(k,t){
  const s=state[k];
  if(t==='merged')  return !!s.mergeInto;
  if(t==='changed') return modified(k);
  if(t==='hidden')  return !s.mergeInto && !s.art;
  return !s.mergeInto && s.art;                      // visible
}
function srcOf(k){ return (ART[k].sources||[]).map(x=>SRCL[x]||x).join(' · '); }
function pending(){ return KEYS.filter(modified).length; }

function renderTabs(){
  tabsEl.innerHTML = TABS.map(([t,l])=>{
    const n=KEYS.filter(k=>inTab(k,t)).length;
    return `<button class="tab${t===tab?' on':''}" data-t="${t}"><b>${l}</b><small>${n}</small></button>`;
  }).join('');
}
function renderChips(){
  const ks=KEYS.filter(k=>inTab(k,tab));
  const n={all:ks.length};
  for(const k of ks) n[state[k].cat]=(n[state[k].cat]||0)+1;
  chipsEl.innerHTML = [["all","הכל"],...CATS].map(([v,l])=>
    `<button class="chip${v===cat?' on':''}" data-c="${v}">${l}${n[v]?` ${n[v]}`:''}</button>`).join('');
  chipsEl.style.display = tab==='merged' ? 'none' : 'flex';
}
function row(k){
  const s=state[k];
  if(s.mergeInto){
    const w=state[s.mergeInto] ? state[s.mergeInto].name : s.mergeInto;
    return `<li class="merged-row" data-k="${esc(k)}">
      <div class=cbadge>🔗</div>
      <div class=rinfo><b>${esc(s.name)}</b><span>ימוזג אל «${esc(w)}» · ${esc(srcOf(k))}</span></div>
      <div class=chev>‹</div></li>`;
  }
  const flags = (modified(k)?'<span class=dot></span>':'') + (s.art?'':'🚫');
  return `<li class="${s.art?'':'hidden-row'}" data-k="${esc(k)}">
    <div class=cbadge>${CATE[s.cat]||'🎵'}</div>
    <div class=rinfo><b>${esc(s.name)}</b><span>${esc(srcOf(k))}</span></div>
    <div class=flags>${flags}</div>
    <div class=chev>‹</div></li>`;
}
function render(){
  renderTabs(); renderChips();
  const f=nrm(q.value);
  let ks=KEYS.filter(k=>inTab(k,tab));
  if(tab!=='merged' && cat!=='all') ks=ks.filter(k=>state[k].cat===cat);
  if(f) ks=ks.filter(k=>nrm(state[k].name).includes(f)||k.toLowerCase().includes(f));
  list.innerHTML = ks.length ? ks.slice(0,1200).map(row).join('')
                             : '<div class=empty>אין אמנים בתצוגה הזו 🤷</div>';
  updateSaveUi();
}
// ONE save control: Telegram's MainButton in-app, the floating button in a browser.
function updateSaveUi(){
  const n=pending();
  const label=`💾 שמור ${n} שינויים`;
  if(inApp && tg.MainButton){
    fab.style.display='none';
    if(n){ tg.MainButton.setText(label); tg.MainButton.show(); } else tg.MainButton.hide();
  }else{
    fab.textContent=label;
    fab.style.display = n ? 'block' : 'none';
  }
}

// ---- the artist's current shows (dates + links), shown inside the sheet ----
let SHOWS=null;                                   // artist_key -> [{iso,d,v,u,so}]
async function loadShows(){
  try{
    const j=await (await fetch(RAW_SHOWS)).json();
    const by={};
    for(const s of Object.values(j)){
      if(!s.artist_key) continue;
      (by[s.artist_key]=by[s.artist_key]||[]).push({
        iso:s.date_iso||"",
        d:s.date_iso?`${s.date_iso.slice(8,10)}.${s.date_iso.slice(5,7)}`:(s.date_raw||"?"),
        v:s.venue||"", u:s.url||"", so:!!s.sold_out});
    }
    for(const k in by) by[k].sort((a,b)=>(a.iso||"9999").localeCompare(b.iso||"9999"));
    SHOWS=by;
  }catch(e){ SHOWS={}; }
  if(open) renderShows(open);
}
function renderShows(k){
  const el=$('sShows');
  if(!SHOWS){ el.innerHTML='<div class="fld">🎫 טוען הופעות…</div>'; return; }
  const rows=SHOWS[k]||[];
  if(!rows.length){ el.innerHTML='<div class="fld">🎫 אין הופעות עתידיות ברשימה</div>'; return; }
  el.innerHTML=`<div class="fld">🎫 הופעות קיימות (${rows.length})</div><div id="showList">`+
    rows.map(s=>`<a class="showrow${s.so?' soldout':''}" href="${esc(s.u)}" data-u="${esc(s.u)}">
      <span class=sdate>${esc(s.d)}</span><span class=svenue>${esc(s.v)}</span>
      ${s.so?'<span class=sold>אזל</span>':''}<span class=schev>↗</span></a>`).join('')+'</div>';
}
$('sShows').addEventListener('click',e=>{
  const a=e.target.closest('.showrow'); if(!a) return;
  e.preventDefault();
  const u=a.dataset.u; if(!u) return;
  if(tg && tg.openLink) tg.openLink(u); else window.open(u,'_blank','noopener');
});

// ---- bottom-sheet editor ----
function openSheet(k){
  open=k;
  const s=state[k];
  $('sTitle').textContent = ART[k].display;
  $('sSrc').textContent = srcOf(k) + ' · מפתח: ' + k;
  renderShows(k);
  const merged=!!s.mergeInto;
  $('editArea').style.display = merged?'none':'block';
  $('mergedNote').style.display = merged?'block':'none';
  if(merged){
    const w=state[s.mergeInto] ? state[s.mergeInto].name : s.mergeInto;
    $('mergedNote').textContent = `🔗 הרשומה תמוזג אל «${w}» בשמירה הבאה. העוקבים עוברים אוטומטית.`;
  }else{
    $('sName').value=s.name;
    $('sCats').innerHTML = CATS.map(([v,l])=>
      `<button class="scat${v===s.cat?' on':''}" data-v="${v}">${l}</button>`).join('');
    $('sVis').checked=s.art;
    refreshMergeBtn();
    $('sMergeAny').style.display='block';        // reset the merge picker between sheets
    $('mPick').style.display='none';
  }
  $('sRevert').style.display = modified(k) ? 'block' : 'none';
  $('backdrop').style.display='block';
  $('sheet').style.display='block';
  render();
}
function refreshMergeBtn(){
  const w=open && dupKey(open);
  $('sMerge').style.display = w ? 'block' : 'none';
  if(w) $('sMerge').textContent = `🔗 מזג עם הרשומה הכפולה «${state[w].name}»`;
}
function closeSheet(){ open=null; $('backdrop').style.display='none'; $('sheet').style.display='none'; render(); }
function doMerge(k,w){ if(!w) return; state[k].mergeInto=w; closeSheet(); }

$('sName').addEventListener('input',()=>{
  if(!open) return;
  state[open].name=$('sName').value.trim();
  $('sRevert').style.display = modified(open)?'block':'none';
  refreshMergeBtn();
});
$('sName').addEventListener('change',()=>{             // finished typing — offer merge on clash
  if(!open) return;
  const w=dupKey(open);
  if(w){
    const msg=`כבר קיימת רשומה בשם «${state[open].name}». למזג את שתי הרשומות לאמן אחד?`;
    if(tg && tg.showConfirm) tg.showConfirm(msg, ok=>{ if(ok) doMerge(open,w); });
    else if(confirm(msg)) doMerge(open,w);
  }
});
$('sCats').addEventListener('click',e=>{
  const b=e.target.closest('.scat'); if(!b||!open) return;
  state[open].cat=b.dataset.v;
  document.querySelectorAll('.scat').forEach(x=>x.classList.toggle('on',x===b));
  $('sRevert').style.display = modified(open)?'block':'none';
});
$('sVis').addEventListener('change',()=>{
  if(!open) return;
  state[open].art=$('sVis').checked;
  $('sRevert').style.display = modified(open)?'block':'none';
});
$('sMerge').addEventListener('click',()=>{ if(open) doMerge(open,dupKey(open)); });
// Free merge: pick ANY artist as the merge target (search + tap + confirm).
$('sMergeAny').addEventListener('click',()=>{
  $('sMergeAny').style.display='none';
  $('mPick').style.display='block';
  $('mSearch').value='';
  renderMergeList();
  $('mSearch').focus();
});
function renderMergeList(){
  if(!open) return;
  const f=nrm($('mSearch').value);
  let ks=KEYS.filter(k=>k!==open && !state[k].mergeInto);
  if(f) ks=ks.filter(k=>nrm(state[k].name).includes(f)||k.toLowerCase().includes(f));
  $('mList').innerHTML = ks.slice(0,60).map(k=>
    `<a class="showrow mrow" data-k="${esc(k)}">
      <span class=sdate>${CATE[state[k].cat]||'🎵'}</span>
      <span class=svenue><b>${esc(state[k].name)}</b> · ${esc(srcOf(k))}</span>
      <span class=schev>‹</span></a>`).join('')
    || '<div class="fld">לא נמצא אמן כזה</div>';
}
$('mSearch').addEventListener('input',renderMergeList);
$('mList').addEventListener('click',e=>{
  const a=e.target.closest('.mrow'); if(!a||!open) return;
  const w=a.dataset.k;
  const msg=`למזג את «${state[open].name}» לתוך «${state[w].name}»?`;
  if(tg && tg.showConfirm) tg.showConfirm(msg, ok=>{ if(ok) doMerge(open,w); });
  else if(confirm(msg)) doMerge(open,w);
});
$('sRevert').addEventListener('click',()=>{
  if(!open) return;
  const b=base(ART[open]);
  state[open]={name:b.name,cat:b.cat,art:b.art,mergeInto:null};
  openSheet(open);
});
$('sDone').addEventListener('click',closeSheet);
$('backdrop').addEventListener('click',closeSheet);

// ---- list / header events ----
list.addEventListener('click',e=>{
  const li=e.target.closest('li'); if(li) openSheet(li.dataset.k);
});
tabsEl.addEventListener('click',e=>{
  const b=e.target.closest('.tab'); if(!b) return;
  tab=b.dataset.t; cat='all'; render();
});
chipsEl.addEventListener('click',e=>{
  const b=e.target.closest('.chip'); if(!b) return;
  cat=b.dataset.c; render();
});
q.addEventListener('input',render);

// ---- save (single handler for MainButton / fab) ----
async function save(){
  if(!inApp||busy) return; busy=true;
  if(tg.MainButton) tg.MainButton.showProgress();
  const overrides={};
  for(const k of KEYS){
    const b=base(ART[k]), s=state[k], o={};
    if(s.mergeInto){ o.merge_into=s.mergeInto; overrides[k]=o; continue; }   // absorbed
    if(s.name && s.name!==b.name) o.name=s.name;
    if(s.cat!==b.cat) o.category=s.cat;
    if(s.art!==b.art) o.is_artist=s.art;
    if(Object.keys(o).length) overrides[k]=o;
  }
  // Preserve override entries whose key is no longer in the catalogue (merged-away
  // losers etc.) — old follows still resolve through their merge_into mapping.
  // Also guards against wiping everything if the catalogue failed to load.
  for(const k in OV0) if(!(k in ART) && !(k in overrides)) overrides[k]=OV0[k];
  if(!KEYS.length){ (tg.showAlert?tg.showAlert:alert)('הקטלוג לא נטען — לא שומר.'); busy=false; if(tg.MainButton) tg.MainButton.hideProgress(); return; }
  try{
    const r=await fetch(WORKER+'/api/overrides',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({initData:tg.initData, overrides})});
    if(r.ok){ const j=await r.json();
      (tg.showAlert?tg.showAlert:alert)(`נשמרו ${j.count} התאמות ✅ (מיזוגים מתאחדים בסריקה הבאה)`);
    } else { (tg.showAlert?tg.showAlert:alert)('שמירה נכשלה ('+r.status+'). ודא שאתה האדמין.'); }
  }catch(e){ (tg.showAlert?tg.showAlert:alert)('שגיאת רשת'); }
  busy=false; if(tg.MainButton) tg.MainButton.hideProgress();
  render();
}
fab.addEventListener('click',()=>{ if(inApp) save(); else (tg&&tg.showAlert?tg.showAlert:alert)('שמירה אפשרית רק מתוך טלגרם (/id בבוט)'); });

async function load(){
  try{
    const [a,ov]=await Promise.all([
      fetch(WORKER+'/api/catalogue').then(r=>r.json()),
      fetch(WORKER+'/api/overrides').then(r=>r.json()).catch(()=>({}))]);
    ART=a||{}; OV0=ov||{};
    KEYS=Object.keys(ART);
    for(const k of KEYS){
      const b=base(ART[k]), o=ov[k]||{};
      state[k]={ name:o.name||b.name, cat:o.category||b.cat,
                 art:('is_artist' in o)? !!o.is_artist : b.art,
                 mergeInto:o.merge_into||null };
    }
    KEYS.sort((x,y)=>state[x].name.localeCompare(state[y].name,'he'));
    if(inApp && tg.MainButton) tg.MainButton.onClick(save);
    render();
    loadShows();                       // fetched in the background; sheets fill in
  }catch(e){ list.innerHTML='<div class=empty>שגיאה בטעינה: '+esc(String(e))+'</div>'; }
}
load();
</script></body></html>
