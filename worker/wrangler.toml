name = "concert-alerts-bot"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Follows live in KV (one key "subscribers"). After `wrangler kv namespace create SUBS`
# put the returned id here.
kv_namespaces = [
  { binding = "SUBS", id = "b2516bc78a5548c5b17d53619893b2e8" }
]

# Workers AI (free daily allowance) — FALLBACK classifier when GEMINI_API_KEY is
# unset. Primary classifier is Google Gemini (web-grounded). Cached in KV.
[ai]
binding = "AI"

# Reliable hourly scan trigger: Cloudflare cron fires every hour; the Worker's
# scheduled() handler dispatches the GitHub scan workflow (GitHub's own cron drops
# most hourly runs). Needs secret GH_TOKEN (fine-grained PAT, Actions: read+write).
[triggers]
crons = ["0 * * * *"]

# Secrets (set with `wrangler secret put <NAME>`), NOT stored here:
#   BOT_TOKEN       - Telegram bot token
#   WEBHOOK_SECRET  - random; also passed to setWebhook as secret_token
#   NOTIFY_SECRET   - random; shared with the GitHub Actions scanner
#   GEMINI_API_KEY  - Google AI Studio key; enables Gemini (gemini-2.5-flash) with
#                     Google-Search grounding for /classify. Free-tier grounded quota
#                     is small (~70 artists/day) so the catalogue upgrades over a few days.
#   GH_TOKEN        - GitHub fine-grained PAT (repo AYALSO/concert-alerts, Actions:
#                     read+write); lets the hourly cron dispatch the scan workflow.
#   ADMIN_CHAT_ID   - the developer's Telegram chat_id. PINS the admin: only this chat
#                     gets the daily summary / admin panel and can POST /api/overrides.
#                     (Without it, anyone sending /id could hijack the admin role.)
