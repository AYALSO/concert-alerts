name: concert-scan

on:
  schedule:
    # Hourly (UTC). scan.py runs only 07:00–00:00 Israel time, every day (DST-aware).
    - cron: "0 * * * *"
  workflow_dispatch:           # manual run
    inputs:
      force:
        description: "Scan now even outside active hours (07:00–00:00 Israel)"
        type: boolean
        default: true

permissions:
  contents: write              # needed to commit updated data back to the repo

concurrency:
  group: concert-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run scan
        env:
          EXAMPLE_SCRAPER: ${{ vars.EXAMPLE_SCRAPER || 'off' }}
          # Cron is gated to active hours in scan.py; a manual run forces a scan anyway.
          FORCE_SCAN: ${{ inputs.force }}
          # New shows are pushed to the Cloudflare Worker, which alerts followers.
          WORKER_NOTIFY_URL: ${{ vars.WORKER_NOTIFY_URL }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: python scan.py

      - name: Build searchable artist page
        run: python make_artist_page.py

      - name: Commit data + page changes
        run: |
          git config user.name "concert-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          git diff --staged --quiet || git commit -m "update data + page [skip ci]"
          git push
