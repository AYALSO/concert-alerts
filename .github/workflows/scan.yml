name: concert-scan

on:
  # Triggered hourly ON THE HOUR by the Cloudflare Worker cron (reliable) via
  # workflow_dispatch — see the Worker's scheduled()/dispatchScan(). GitHub's own
  # `schedule:` cron was REMOVED: it fired late/erratically (e.g. 08:08, 12:54),
  # producing off-hour duplicate scans on top of the Worker's clean :00 runs.
  workflow_dispatch:           # Worker-cron + manual
    inputs:
      force:
        description: "Scan now even outside active hours (07:00–00:00 Israel)"
        type: boolean
        default: true

permissions:
  contents: write              # needed to commit updated data back to the repo

concurrency:
  group: concert-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run scan
        env:
          EXAMPLE_SCRAPER: ${{ vars.EXAMPLE_SCRAPER || 'off' }}
          # Cron is gated to active hours in scan.py; a manual run forces a scan anyway.
          FORCE_SCAN: ${{ inputs.force }}
          # New shows are pushed to the Cloudflare Worker, which alerts followers.
          WORKER_NOTIFY_URL: ${{ vars.WORKER_NOTIFY_URL }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: python scan.py

      - name: Build searchable artist page
        run: python make_artist_page.py

      - name: Commit data + page changes
        run: |
          git config user.name "concert-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          if git diff --staged --quiet; then echo "no changes"; exit 0; fi
          git commit -m "update data + page [skip ci]"
          # main may move while the scan runs (other scans / pushes). Pull-merge and
          # retry so a concurrent push never fails the run; this scan's fresh data wins.
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push rejected (attempt $i) — merging remote, keeping this scan's data"
            git pull --no-rebase -X ours --no-edit origin main || true
          done
          git push
