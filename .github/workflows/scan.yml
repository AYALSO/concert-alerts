name: concert-scan

on:
  schedule:
    - cron: "0 * * * *"      # every hour (UTC); Saturday is skipped in code (Israel time)
  workflow_dispatch:           # lets you run it manually for instant updates
    inputs:
      force:
        description: "Scan even on Saturday (Israel time)"
        type: boolean
        default: true

permissions:
  contents: write              # needed to commit updated data back to the repo

concurrency:
  group: concert-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          EXAMPLE_SCRAPER: ${{ vars.EXAMPLE_SCRAPER || 'off' }}
          # Cron runs skip Saturday; a manual run with force=true (default) scans anyway.
          SKIP_SATURDAY: ${{ inputs.force && 'false' || 'true' }}
        run: python scan.py

      - name: Build searchable artist page
        run: python make_artist_page.py

      - name: Commit data + page changes
        run: |
          git config user.name "concert-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          git diff --staged --quiet || git commit -m "update data + page [skip ci]"
          git push
